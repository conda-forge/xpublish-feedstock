{% set python_min = "3.11" %}
{% set name = "xpublish" %}
{% set version = "0.4.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 3d091edf9b86cf2f5e0090701ea58d2aebe056e7772d78cca107d91a5627da77

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=42
    - setuptools-scm >=6.2
    - pip
  run:
    - python >={{ python_min }}
    - cachey
    - dask-core
    - fastapi >=0.115.0
    - numcodecs
    - numpy
    - pluggy
    - pydantic >=2.5.0
    - toolz
    - uvicorn
    - xarray >=2025.7.0
    - zarr >=3.0.7

test:
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check
  imports:
    - xpublish

about:
  home: https://xpublish.readthedocs.io
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: Publish Xarray Datasets via a Zarr compatible REST API
  description: |
    Xpublish lets you serve, share and publish Xarray Datasets via a web application.
    The data and/or metadata in the Xarray Datasets can be exposed in various forms
    through pluggable REST API endpoints. Efficient, on-demand delivery of large
    datasets may be enabled with Dask on the server-side.
  doc_url: https://xpublish.readthedocs.io/
  dev_url: https://github.com/xarray-contrib/xpublish
extra:
  recipe-maintainers:
    - mpiannucci
    - abkfenris
    - andersy005
    - jhamman
    - ocefpaf
